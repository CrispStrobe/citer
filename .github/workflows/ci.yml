name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-socket python-decouple

      # We gate on this fork's own offline contract tests, which cover the SRU
      # parsers (lib/sru_client.py) and the restructured app — the parity-relevant
      # surface. The upstream citation-scraping suite (doi / isbn_oclc / pubmed /
      # googlebooks / urls / test_fa) replays cached fixtures that aren't all
      # present in this fork and otherwise reaches live services, so it is not run
      # here. Run the full suite locally with `pytest` if you touch those paths.
      - name: Run offline contract tests
        run: pytest tests/sru_client_test.py tests/app_contract_test.py tests/parser_parity_test.py -q
